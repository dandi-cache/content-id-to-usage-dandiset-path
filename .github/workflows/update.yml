name: Update

on:
  schedule:
    - cron: "0 0 * * *"  # TODO: set the desired schedule
  workflow_dispatch:

jobs:
  Update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets._GITHUB_API_KEY }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "envs/uv.lock"

      - name: Run update
        run: uv run --project envs python ./code/update.py

      - name: Upload YAML
        run: |
          git add .
          git commit --message "update" || true  # || true in case of no changes
          git push

      - name: Run minification
        run: uv run --project envs python ./code/minify.py

      - name: Upload minification
        run: |
          git push origin --delete min || true  # || true in case branch doesn't exist yet

          git checkout -b min
          git add .
          git commit --message "update min" || true  # || true in case of no changes
          git push --set-upstream origin min

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ Update ]
    if: ${{ always() && failure() }}
    permissions: {}
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: DANDI Cache: <cache-name>"  # TODO: set the cache name
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: dandi-cache
          body: "Please check the latest run of the DANDI Cache update: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
